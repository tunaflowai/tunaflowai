name: Feature request
description: Suggest a capability for TunaFlowAI
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, API, or UX you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - model router
        - observers
        - tools
        - permissions
        - context compression
        - dashboard
        - documentation
    validations:
      required: true
